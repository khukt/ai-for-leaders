name: Generate PDF

on:
  push:
    paths:
      - '_book/**'
      - 'scripts/build_pdf_book.py'
      - '.github/workflows/generate-pdf.yml'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-xetex

      - name: Combine book chapters
        run: |
          python3 scripts/build_pdf_book.py

      - name: Generate PDF
        run: |
          pandoc /tmp/book.md \
            -o assets/AI-for-Leaders.pdf \
            --from markdown+pipe_tables+raw_tex \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=2 \
            --top-level-division=chapter \
            -V documentclass=book \
            -V classoption=oneside \
            -V geometry:margin=1in

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/AI-for-Leaders.pdf
          git diff --cached --quiet || (git commit -m "chore: regenerate AI-for-Leaders.pdf" && git push)
