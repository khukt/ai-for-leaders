  <title id="title">Comprehensive EU AI Act Implementation Timeline</title>
  <desc id="desc">A static timeline chart styled after a Plotly figure, showing 16 AI Act milestones from January 2024 to August 2031, with colored phase backgrounds for Setup, Implementation, and Enforcement.</desc>
