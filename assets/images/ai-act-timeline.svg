      .title { font: 700 30px Arial, sans-serif; fill: #2c3e50; }
      .axis-label { font: 600 18px Arial, sans-serif; fill: #34495e; }
      .tick { font: 400 15px Arial, sans-serif; fill: #34495e; }
      .y-tick { font: 400 18px Arial, sans-serif; fill: #2f2f2f; }
      .anno-box { fill: rgba(255,255,255,0.92); stroke: #a9a9a9; stroke-width: 1; rx: 6; ry: 6; }
      .anno-text { font: 400 15px Arial, sans-serif; fill: #36454f; }
      .legend-dot { stroke: none; }
