  <text x="310" y="680" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#c8d0db">Feature importance, common rules, recurring patterns, average drivers</text>

  <circle cx="1085" cy="450" r="205" fill="none" stroke="#8ee1ff" stroke-width="4"/>

  <g transform="translate(1085,455)">
    <circle cx="0" cy="-18" r="78" fill="#8c979b"/>
    <rect x="-62" y="66" width="124" height="132" rx="28" fill="#778186"/>
