<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Global versus local explanation in explainable AI</title>
  <desc id="desc">A side-by-side comparison showing global explanation as understanding what matters across many decisions, and local explanation as understanding why one specific decision was made.</desc>
  <rect width="1400" height="760" fill="#0b0f18"/>

  <text x="80" y="90" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#ffffff">Global vs Local Explanation</text>
  <text x="80" y="135" font-family="Arial, sans-serif" font-size="24" fill="#c8d0db">Both matter. Global explanation shows what drives the model overall. Local explanation shows why one specific output happened.</text>

  <text x="310" y="205" font-family="Arial, sans-serif" font-size="40" font-weight="700" text-anchor="middle" fill="#8ee1ff">Global</text>
  <text x="310" y="245" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#c8d0db">What matters overall</text>

  <text x="1085" y="205" font-family="Arial, sans-serif" font-size="40" font-weight="700" text-anchor="middle" fill="#8ee1ff">Local</text>
  <text x="1085" y="245" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#c8d0db">Why a specific decision was made</text>

  <circle cx="310" cy="450" r="205" fill="none" stroke="#8ee1ff" stroke-width="4"/>

  <g transform="translate(110,270)">
    <g fill="#7f8a8f">
      <g id="bot">
        <circle cx="0" cy="0" r="18"/>
        <rect x="-12" y="20" width="24" height="26" rx="8"/>
        <circle cx="-6" cy="-3" r="3" fill="#9cf3ff"/>
        <circle cx="6" cy="-3" r="3" fill="#9cf3ff"/>
      </g>
    </g>
    <use href="#bot" x="40" y="20"/>
    <use href="#bot" x="85" y="8"/>
    <use href="#bot" x="130" y="18"/>
    <use href="#bot" x="175" y="8"/>
    <use href="#bot" x="220" y="18"/>
    <use href="#bot" x="265" y="10"/>
    <use href="#bot" x="310" y="24"/>
