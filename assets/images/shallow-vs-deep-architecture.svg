<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Shallow versus deep model architecture</title>
  <desc id="desc">A comparison of a shallow model with a small number of layers and a deep model with many layers and many more internal connections.</desc>
  <rect width="1400" height="820" fill="#f7f9fc"/>

  <text x="110" y="95" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#24324a">Shallow vs Deep Model Architecture</text>
  <text x="110" y="140" font-family="Arial, sans-serif" font-size="24" fill="#5a6b85">Leadership point: deeper architectures can represent more complex patterns, but they also increase opacity, data demand, and governance difficulty.</text>

  <text x="260" y="220" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="#30567d">Shallow Model</text>
  <text x="1020" y="220" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="#30567d">Deep Model</text>

