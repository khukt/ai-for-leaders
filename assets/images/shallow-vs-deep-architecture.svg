  <text x="1020" y="700" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#4d6078">More layers and many more internal representations</text>

  <text x="110" y="760" font-family="Arial, sans-serif" font-size="24" fill="#4d6078">Shallow models can be easier to inspect and govern. Deep models often perform better on complex tasks, but they usually need more data, more compute, and stronger oversight.</text>
</svg>
