title: "AI for Leaders"
description: "An open-source executive guide to AI strategy, regulation, governance, and risk"
author: "Kyi Thar, Nishat I Mowla, and Sarder Fakhrul Abedin"

# IMPORTANT:
# If the site is published under a repository path such as
# https://USER.github.io/REPO then set:
# baseurl: "/REPO"
# If the site is published on a custom domain at the domain root,
# keep baseurl empty.
baseurl: ""
url: "https://aileaders.trustworthyai.space"

remote_theme: just-the-docs/just-the-docs
color_scheme: light
search_enabled: true
permalink: pretty
plugins:
  - jekyll-redirect-from

collections:
  book:
    output: true
    permalink: /book/:name/

just_the_docs:
  collections:
    book:
      name: Book
      nav_fold: false
